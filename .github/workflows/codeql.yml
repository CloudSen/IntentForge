name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "17 2 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  detect-java:
    name: Detect Java sources
    runs-on: ubuntu-latest
    outputs:
      has_java: ${{ steps.scan.outputs.has_java }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Scan repository
        id: scan
        run: |
          if find . -type f \( -name '*.java' -o -name '*.kt' \) | grep -q .; then
            echo "has_java=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_java=false" >> "$GITHUB_OUTPUT"
          fi

  analyze:
    name: Analyze (${{ matrix.language }})
    needs: detect-java
    if: needs.detect-java.outputs.has_java == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language:
          - java

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: none

      - name: Analyze
        uses: github/codeql-action/analyze@v4
